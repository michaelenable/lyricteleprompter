<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Lyric Teleprompter</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0f">

<!-- iOS PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Teleprompter">
<link rel="apple-touch-icon" href="icons/icon-192.svg">

<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --bg-panel: #12121a;
    --bg-card: #1a1a26;
    --bg-hover: #222233;
    --border: #2a2a3a;
    --text: #e0e0e8;
    --text-dim: #6a6a7a;
    --text-muted: #444458;
    --accent: #ff6b35;
    --accent-glow: rgba(255, 107, 53, 0.3);
    --green: #4ade80;
    --green-dim: rgba(74, 222, 128, 0.15);
    --red: #f87171;
    --blue: #60a5fa;
    /* Safe area insets for notched devices */
    --sai-top: env(safe-area-inset-top, 0px);
    --sai-bottom: env(safe-area-inset-bottom, 0px);
    --sai-left: env(safe-area-inset-left, 0px);
    --sai-right: env(safe-area-inset-right, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
  }

  .app { display: flex; height: 100vh; height: 100dvh; }

  /* ============ Sidebar ============ */
  .sidebar {
    width: 280px;
    min-width: 280px;
    background: var(--bg-panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding-top: var(--sai-top);
    padding-left: var(--sai-left);
  }

  .sidebar-header {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-header h1 {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--accent);
    margin-bottom: 2px;
  }

  .sidebar-header .sub {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .song-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    -webkit-overflow-scrolling: touch;
  }

  .song-item {
    padding: 12px 14px;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 2px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: background 0.15s;
    font-size: 13px;
  }

  .song-item:hover { background: var(--bg-hover); }
  .song-item.active { background: var(--bg-card); border: 1px solid var(--border); }

  .song-num {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    min-width: 18px;
  }

  .song-name { flex: 1; }

  .song-status { display: flex; gap: 4px; }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
  }

  .status-dot.has-lyrics { background: var(--green); }
  .status-dot.has-audio { background: var(--blue); }
  .status-dot.has-timing { background: var(--accent); }

  .sidebar-footer {
    padding: 12px;
    border-top: 1px solid var(--border);
    padding-bottom: calc(12px + var(--sai-bottom));
  }

  .sidebar-footer .legend {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    color: var(--text-dim);
  }

  .sidebar-footer .legend .status-dot { width: 5px; height: 5px; }

  /* ============ Main area ============ */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding-top: var(--sai-top);
    padding-right: var(--sai-right);
  }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-panel);
  }

  .mode-tabs {
    display: flex;
    gap: 2px;
    background: var(--bg);
    border-radius: 8px;
    padding: 3px;
  }

  .mode-tab {
    padding: 6px 16px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--text-dim);
    transition: all 0.15s;
  }

  .mode-tab.active { background: var(--bg-card); color: var(--text); }
  .mode-tab:hover:not(.active) { color: var(--text); }

  .toolbar-spacer { flex: 1; }

  .btn {
    padding: 7px 16px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text);
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }

  .btn:hover { background: var(--bg-hover); border-color: var(--text-dim); }

  .btn-accent { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-accent:hover { opacity: 0.85; background: var(--accent); }
  .btn-green { background: var(--green); border-color: var(--green); color: #000; }
  .btn-red { background: var(--red); border-color: var(--red); color: #000; }

  .content {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    -webkit-overflow-scrolling: touch;
  }

  /* ============ Setup mode ============ */
  .setup-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    max-width: 900px;
  }

  .setup-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
  }

  .setup-card h3 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin-bottom: 14px;
  }

  .setup-card.full { grid-column: 1 / -1; }

  .lyrics-textarea {
    width: 100%;
    min-height: 300px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    line-height: 1.8;
    padding: 14px;
    resize: vertical;
    -webkit-user-select: text;
    user-select: text;
  }

  .lyrics-textarea:focus { outline: none; border-color: var(--accent); }
  .lyrics-textarea::placeholder { color: var(--text-muted); }

  .file-drop {
    border: 2px dashed var(--border);
    border-radius: 8px;
    padding: 30px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
  }

  .file-drop:hover { border-color: var(--accent); background: rgba(255,107,53,0.03); }
  .file-drop .icon { font-size: 28px; margin-bottom: 8px; }
  .file-drop .label { font-size: 13px; color: var(--text-dim); }

  .file-loaded {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px;
    background: var(--green-dim);
    border-radius: 8px;
    font-size: 13px;
  }

  .file-loaded .fname { flex: 1; color: var(--green); font-weight: 500; }

  /* ============ Audio bar ============ */
  .audio-bar {
    padding: 12px 20px;
    padding-bottom: calc(12px + var(--sai-bottom));
    border-top: 1px solid var(--border);
    background: var(--bg-panel);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .audio-bar .play-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .audio-bar .play-btn:hover { opacity: 0.85; }

  .progress-wrap {
    flex: 1;
    height: 6px;
    background: var(--bg);
    border-radius: 3px;
    cursor: pointer;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.1s linear;
  }

  .time-display {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    min-width: 90px;
    text-align: right;
  }

  /* ============ Rehearsal mode ============ */
  .rehearsal-view {
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
    padding: 40px 20px;
  }

  .rehearsal-instruction {
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 12px;
  }

  .rehearsal-current {
    font-size: 28px;
    font-weight: 700;
    text-align: center;
    max-width: 700px;
    line-height: 1.5;
    margin-bottom: 8px;
    min-height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .rehearsal-next {
    font-size: 16px;
    color: var(--text-dim);
    text-align: center;
    max-width: 600px;
    min-height: 30px;
    margin-bottom: 30px;
  }

  .rehearsal-progress {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  .tap-btn {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    background: rgba(255,107,53,0.08);
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.1s;
    text-transform: uppercase;
    letter-spacing: 2px;
    /* Better touch target */
    touch-action: manipulation;
  }

  .tap-btn:hover { background: rgba(255,107,53,0.15); }
  .tap-btn:active { transform: scale(0.95); background: rgba(255,107,53,0.25); }

  /* ==============================================
     PERFORMANCE MODE - smooth scroll architecture
     ============================================== */
  .performance-view {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 1000;
    display: flex;
    flex-direction: column;
  }

  /* Cursor auto-hide — timer always visible, only controls hide */
  .performance-view:not(.show-cursor) { cursor: none; }
  .performance-view:not(.show-cursor) .perf-controls {
    opacity: 0 !important;
    pointer-events: none;
  }
  .performance-view.show-cursor .perf-controls {
    opacity: 1;
    pointer-events: auto;
  }

  .perf-timer {
    position: absolute;
    top: calc(12px + var(--sai-top));
    right: calc(16px + var(--sai-right));
    font-family: 'Space Mono', monospace;
    font-size: 24px;
    font-weight: 700;
    z-index: 10;
    letter-spacing: 2px;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }

  .perf-lyrics {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  /* Scroll container — holds ALL lines, moved via CSS transform */
  .perf-scroll {
    position: absolute;
    left: 0;
    right: 0;
    top: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    /* Vertical padding so first/last lines can be centered in viewport */
    padding-top: 38vh;
    padding-bottom: 50vh;
    transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    will-change: transform;
  }

  /* Each lyric line — smooth transitions between states */
  .perf-line {
    text-align: center;
    max-width: 85vw;
    width: 100%;
    padding: 8px 20px;
    line-height: 1.35;
    white-space: normal;
    word-wrap: break-word;
    transition:
      font-size 0.4s cubic-bezier(0.22, 1, 0.36, 1),
      color 0.4s ease-out,
      opacity 0.4s ease-out,
      text-shadow 0.4s ease-out,
      transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    transform-origin: center center;
  }

  .perf-line.distant-past {
    font-size: 32px;
    color: #1a1a1a;
    opacity: 0;
    transform: scale(0.85);
  }

  .perf-line.past {
    font-size: 36px;
    color: #333;
    opacity: 0.35;
    transform: scale(0.9);
  }

  .perf-line.current {
    font-size: 84px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 0 60px var(--accent-glow), 0 0 120px rgba(255, 107, 53, 0.15);
    padding: 18px 20px;
    opacity: 1;
    transform: scale(1);
  }

  .perf-line.next {
    font-size: 56px;
    color: #777;
    opacity: 0.85;
    transform: scale(0.95);
  }

  .perf-line.next-2 {
    font-size: 44px;
    color: #555;
    opacity: 0.6;
    transform: scale(0.92);
  }

  .perf-line.far {
    font-size: 36px;
    color: #2a2a2a;
    opacity: 0.3;
    transform: scale(0.88);
  }

  .perf-line.distant-far {
    font-size: 32px;
    color: #1a1a1a;
    opacity: 0;
    transform: scale(0.85);
  }

  /* Section markers like [Chorus] */
  .perf-line.section-marker.current {
    color: var(--accent);
    font-size: 28px;
    text-shadow: 0 0 40px var(--accent-glow);
  }

  .perf-line.section-marker:not(.current) {
    font-style: italic;
  }

  /* Controls bar */
  .perf-controls {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.95) 30%);
    padding: 40px 24px 20px;
    padding-bottom: calc(20px + var(--sai-bottom));
    padding-left: calc(24px + var(--sai-left));
    padding-right: calc(24px + var(--sai-right));
    z-index: 20;
    display: flex;
    flex-direction: column;
    gap: 14px;
    transition: opacity 0.4s ease;
  }

  .perf-status {
    font-size: 14px;
    color: var(--text-muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    text-align: center;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    transition: opacity 0.4s ease;
  }

  .perf-countdown {
    position: absolute;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    pointer-events: none;
    z-index: 5;
    opacity: 0;
    transition: opacity 0.3s ease;
    width: 60%;
    max-width: 500px;
  }

  .perf-countdown.visible { opacity: 1; }

  .perf-countdown .cd-seconds {
    font-family: 'Space Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
  }

  .perf-countdown .cd-bar-track {
    width: 100%;
    height: 6px;
    background: #1a1a1a;
    border-radius: 3px;
    overflow: hidden;
  }

  .perf-countdown .cd-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: none;
    box-shadow: 0 0 12px var(--accent-glow);
  }

  /* ============ Responsive: iPad/tablet ============ */
  @media (max-width: 768px) {
    .sidebar { width: 220px; min-width: 220px; }
    .setup-grid { grid-template-columns: 1fr; }
    .setup-card.full { grid-column: 1; }
    .perf-line.current { font-size: 72px; }
    .perf-line.next { font-size: 48px; }
    .perf-timer { font-size: 40px; }
  }

  @media (max-width: 600px) {
    .app { flex-direction: column; }
    .sidebar {
      width: 100%;
      min-width: 100%;
      max-height: 180px;
      border-right: none;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-header { padding: 12px 16px; }
    .sidebar-header h1 { font-size: 12px; }
    .song-list { padding: 4px 8px; }
    .song-item { padding: 8px 10px; font-size: 12px; }
    .sidebar-footer { display: none; }
    .perf-line.current { font-size: 60px; }
    .perf-line.next { font-size: 40px; }
    .perf-timer { font-size: 32px; }
  }

  /* ============ Scrollbar ============ */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-muted);
    font-size: 14px;
    gap: 8px;
  }

  .clear-timing {
    margin-top: 10px;
    font-size: 11px;
    color: var(--red);
    cursor: pointer;
    text-decoration: underline;
    background: none;
    border: none;
    font-family: 'DM Sans', sans-serif;
  }

  .help-text {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 8px;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div id="app"></div>

<script>
// ==============================
// Register service worker
// ==============================
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

const DEFAULT_SONGS = [
  { id: 1, name: 'Blinding Lights' },
  { id: 2, name: "Can't Take My Eyes Off You" },
  { id: 3, name: 'Dancing In The Dark' },
  { id: 4, name: 'Freedom 90' },
  { id: 5, name: 'Home' },
  { id: 6, name: 'Moves Like Jagger' },
  { id: 7, name: 'Sway' },
  { id: 8, name: 'Uptown Funk' },
  { id: 9, name: 'Viva La Vida' },
];
let SONGS = [...DEFAULT_SONGS];
let nextSongId = 10;

// ==============================
// State
// ==============================
let state = {
  activeSong: 1,
  mode: 'setup', // setup, rehearsal, perform
  songs: {},
  audioElements: {},
  playing: false,
  currentTime: 0,
  duration: 0,
  rehearsalLine: 0,
  performLine: 0,
  showCursor: true,
  cursorTimeout: null,
  modalMode: null,
  modalData: '',
  timerStart: 0,
  timerOffset: 0,
  // Setlist — ordered list of song IDs for performance
  setlist: [],
  setlistIndex: 0,
  // Live timing offset — shifts lyrics earlier/later without modifying saved timings
  lyricsOffset: 0,
  // Band mode — tap tempo driven lyrics
  bandMode: false,
  bandTaps: [],
  bandLiveBpm: 0,
  bandStartTime: 0,
  bandSongTime: 0,
  // Setup BPM tapping
  setupBpmTaps: [],
  setupBpmLive: 0,
};

// Performance mode tracking — avoids unnecessary DOM work
let lastRenderedPerfLine = -1;
let perfDomReady = false;
let perfScrollReady = false; // true once initial scroll position is set and transitions re-enabled

// Init song data for defaults
SONGS.forEach(s => {
  state.songs[s.id] = { lyrics: '', timings: [], audioFile: null, bpm: null };
});

// ==============================
// Cloud Sync — Azure Blob Storage
// ==============================
const SYNC_URL = 'https://stenablealerts.blob.core.windows.net/teleprompter/data.json?se=2027-12-31T00%3A00%3A00Z&sp=rw&spr=https&sv=2026-02-06&sr=c&sig=nNaaYgz3U2NDX8c6wYruvIAoyFUljJfLxFy4nGVcBos%3D';
let syncInProgress = false;

function getFullSyncPayload() {
  const songData = {};
  Object.keys(state.songs).forEach(id => {
    songData[id] = {
      lyrics: state.songs[id].lyrics,
      timings: state.songs[id].timings,
      audioFile: state.songs[id].audioFile || null
    };
  });
  return { songs: SONGS, songData: songData, setlist: state.setlist, savedAt: new Date().toISOString() };
}

async function cloudSave() {
  if (syncInProgress) return;
  syncInProgress = true;
  try {
    const payload = JSON.stringify(getFullSyncPayload());
    await fetch(SYNC_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'x-ms-blob-type': 'BlockBlob' },
      body: payload
    });
    console.log('Cloud sync: saved');
  } catch(e) {
    console.warn('Cloud sync save failed:', e);
  }
  syncInProgress = false;
}

async function cloudLoad() {
  try {
    const resp = await fetch(SYNC_URL, { method: 'GET' });
    if (!resp.ok) {
      console.log('Cloud sync: no data yet (status ' + resp.status + ')');
      return false;
    }
    const payload = await resp.json();

    // Restore song list
    if (payload.songs && payload.songs.length) {
      SONGS = payload.songs;
      nextSongId = Math.max(...SONGS.map(s => s.id)) + 1;
      SONGS.forEach(s => {
        if (!state.songs[s.id]) state.songs[s.id] = { lyrics: '', timings: [], audioFile: null, bpm: null };
      });
    }

    // Restore song data
    if (payload.songData) {
      Object.keys(payload.songData).forEach(id => {
        if (state.songs[id]) {
          state.songs[id].lyrics = payload.songData[id].lyrics || '';
          state.songs[id].timings = payload.songData[id].timings || [];
          state.songs[id].audioFile = payload.songData[id].audioFile || null;
          state.songs[id].bpm = payload.songData[id].bpm || null;
        }
      });
    }

    // Restore setlist
    if (payload.setlist) {
      state.setlist = payload.setlist.filter(id => SONGS.find(s => s.id === id));
    }

    // Make sure activeSong is valid
    if (!SONGS.find(s => s.id === state.activeSong) && SONGS.length) {
      state.activeSong = SONGS[0].id;
    }

    console.log('Cloud sync: loaded (' + SONGS.length + ' songs, saved ' + (payload.savedAt || 'unknown') + ')');
    return true;
  } catch(e) {
    console.warn('Cloud sync load failed:', e);
    return false;
  }
}

// Debounced cloud save — waits 2s after last change before syncing
let cloudSaveTimer = null;
function scheduleCloudSave() {
  clearTimeout(cloudSaveTimer);
  cloudSaveTimer = setTimeout(cloudSave, 2000);
}

// ==============================
// Storage — localStorage + cloud sync
// ==============================
function loadState() {
  try {
    // Restore song list
    const songListRaw = localStorage.getItem('teleprompter-songs');
    if (songListRaw) {
      const savedSongs = JSON.parse(songListRaw);
      if (savedSongs.length) {
        SONGS = savedSongs;
        // Recalculate nextSongId
        nextSongId = Math.max(...SONGS.map(s => s.id)) + 1;
        // Ensure all songs have a data entry
        SONGS.forEach(s => {
          if (!state.songs[s.id]) state.songs[s.id] = { lyrics: '', timings: [], audioFile: null, bpm: null };
        });
      }
    }

    // Restore song data (lyrics, timings, audioFile names)
    const raw = localStorage.getItem('teleprompter-data');
    if (raw) {
      const saved = JSON.parse(raw);
      Object.keys(saved).forEach(id => {
        if (state.songs[id]) {
          state.songs[id].lyrics = saved[id].lyrics || '';
          state.songs[id].timings = saved[id].timings || [];
          state.songs[id].audioFile = saved[id].audioFile || null;
          state.songs[id].bpm = saved[id].bpm || null;
        }
      });
    }

    // Restore setlist
    const setlistRaw = localStorage.getItem('teleprompter-setlist');
    if (setlistRaw) {
      const saved = JSON.parse(setlistRaw);
      // Filter out any song IDs that no longer exist
      state.setlist = saved.filter(id => SONGS.find(s => s.id === id));
    }

    // Make sure activeSong is valid
    if (!SONGS.find(s => s.id === state.activeSong) && SONGS.length) {
      state.activeSong = SONGS[0].id;
    }
  } catch(e) {
    console.error('Load error:', e);
  }
}

function saveState() {
  try {
    // Save song list
    localStorage.setItem('teleprompter-songs', JSON.stringify(SONGS));

    // Save song data
    const data = {};
    Object.keys(state.songs).forEach(id => {
      data[id] = {
        lyrics: state.songs[id].lyrics,
        timings: state.songs[id].timings,
        audioFile: state.songs[id].audioFile || null,
        bpm: state.songs[id].bpm || null
      };
    });
    localStorage.setItem('teleprompter-data', JSON.stringify(data));

    // Save setlist
    localStorage.setItem('teleprompter-setlist', JSON.stringify(state.setlist));

    // Sync to cloud (debounced)
    scheduleCloudSave();
  } catch(e) {
    console.error('Save error:', e);
  }
}

function addSong(name) {
  const id = nextSongId++;
  SONGS.push({ id, name });
  SONGS.sort((a, b) => a.name.localeCompare(b.name));
  state.songs[id] = { lyrics: '', timings: [], audioFile: null, bpm: null };
  state.activeSong = id;
  state.mode = 'setup';
  saveState();
  render();
}

function renameSong(id, newName) {
  const song = SONGS.find(s => s.id === id);
  if (song) {
    song.name = newName;
    SONGS.sort((a, b) => a.name.localeCompare(b.name));
    saveState();
    render();
  }
}

function deleteSong(id) {
  if (SONGS.length <= 1) return;
  SONGS = SONGS.filter(s => s.id !== id);
  state.setlist = state.setlist.filter(sid => sid !== id);
  delete state.songs[id];
  delete audioData[id];
  delete state.audioElements[id];
  if (state.activeSong === id) {
    state.activeSong = SONGS[0].id;
  }
  saveState();
  render();
}

// Setlist-aware navigation for perform mode
function getPerformList() {
  // If setlist has songs, use it; otherwise fall back to all songs with timings
  if (state.setlist.length > 0) {
    return state.setlist.map(id => SONGS.find(s => s.id === id)).filter(Boolean);
  }
  return SONGS.filter(s => {
    const d = state.songs[s.id];
    return d && d.lyrics && d.lyrics.trim() && d.timings && d.timings.length > 0;
  });
}

function performNextSong() {
  const list = getPerformList();
  const idx = list.findIndex(s => s.id === state.activeSong);
  if (idx < list.length - 1) {
    selectSong(list[idx + 1].id);
    state.setlistIndex = idx + 1;
    return true;
  }
  return false;
}

function performPrevSong() {
  const list = getPerformList();
  const idx = list.findIndex(s => s.id === state.activeSong);
  if (idx > 0) {
    selectSong(list[idx - 1].id);
    state.setlistIndex = idx - 1;
    return true;
  }
  return false;
}

// ==============================
// Export / Import
// ==============================
function exportData() {
  const data = {};
  SONGS.forEach(s => {
    const song = state.songs[s.id];
    if (song.lyrics || (song.timings && song.timings.length)) {
      data[s.id] = { name: s.name, lyrics: song.lyrics, timings: song.timings, audioFile: song.audioFile };
    }
  });
  state.modalMode = 'export';
  state.modalData = JSON.stringify(data, null, 2);
  render();
}

function importData(json) {
  try {
    const data = JSON.parse(json);
    Object.keys(data).forEach(id => {
      if (state.songs[id]) {
        // Update existing song
        state.songs[id].lyrics = data[id].lyrics || '';
        state.songs[id].timings = data[id].timings || [];
        state.songs[id].audioFile = data[id].audioFile || null;
        if (data[id].bpm) state.songs[id].bpm = data[id].bpm;
        // Update name if provided
        if (data[id].name) {
          const s = SONGS.find(s => s.id === parseInt(id));
          if (s) s.name = data[id].name;
        }
      } else if (data[id].name) {
        // Create new song from import
        const numId = parseInt(id);
        SONGS.push({ id: numId, name: data[id].name });
        state.songs[numId] = {
          lyrics: data[id].lyrics || '',
          timings: data[id].timings || [],
          audioFile: data[id].audioFile || null
        };
        if (numId >= nextSongId) nextSongId = numId + 1;
      }
    });
    // Sort songs alphabetically
    SONGS.sort((a, b) => a.name.localeCompare(b.name));
    saveState();
    state.modalMode = null;
    state.modalData = '';
    render();
  } catch(err) {
    alert('Invalid JSON. Paste the exact text from a previous export.');
  }
}

function showImportModal() {
  state.modalMode = 'import';
  state.modalData = '';
  render();
}

function closeModal() {
  state.modalMode = null;
  state.modalData = '';
  render();
}

function renderModal() {
  if (!state.modalMode) return '';
  const isExport = state.modalMode === 'export';
  return `
    <div style="position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:2000;display:flex;align-items:center;justify-content:center;" id="modal-overlay">
      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:600px;width:90%;max-height:80vh;display:flex;flex-direction:column;gap:14px;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <h3 style="font-size:14px;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);">
            ${isExport ? 'Export' : 'Import'}
          </h3>
          <button class="btn" style="padding:4px 10px;font-size:11px;" id="modal-close">Close</button>
        </div>
        <textarea id="modal-textarea" style="
          width:100%;min-height:300px;background:var(--bg);border:1px solid var(--border);
          border-radius:8px;color:var(--text);font-family:'Space Mono',monospace;font-size:11px;
          line-height:1.6;padding:12px;resize:vertical;-webkit-user-select:text;user-select:text;
        " ${isExport ? 'readonly' : ''} placeholder="${isExport ? '' : 'Paste your exported JSON here...'}">${isExport ? escHtml(state.modalData) : ''}</textarea>
        <div style="display:flex;gap:8px;justify-content:flex-end;">
          ${isExport ? `<button class="btn btn-accent" id="modal-copy">Copy to Clipboard</button>`
                     : `<button class="btn btn-accent" id="modal-import">Import</button>`}
        </div>
      </div>
    </div>
  `;
}

// ==============================
// Standalone timer (no audio)
// ==============================
let perfTimer = null;

function startTimer() {
  state.timerStart = performance.now();
  state.playing = true;
  perfTimer = requestAnimationFrame(tickTimer);
}

function stopTimer() {
  state.timerOffset += (performance.now() - state.timerStart) / 1000;
  state.playing = false;
  if (perfTimer) cancelAnimationFrame(perfTimer);
  perfTimer = null;
}

function resetTimer() {
  state.timerOffset = 0;
  state.timerStart = 0;
  state.currentTime = 0;
  state.playing = false;
  state.performLine = 0;
  if (perfTimer) cancelAnimationFrame(perfTimer);
  perfTimer = null;
}

function tickTimer() {
  if (!state.playing) return;
  state.currentTime = state.timerOffset + (performance.now() - state.timerStart) / 1000;

  const song = getSong();
  if (song.timings && song.timings.length) {
    state.duration = song.timings[song.timings.length - 1] + 5;
  }

  updateTimeDisplays();
  if (state.mode === 'perform') updatePerfDisplay();

  perfTimer = requestAnimationFrame(tickTimer);
}

// Unified play/pause for perform mode
// ==============================
// Band Mode — tap tempo performance
// ==============================
function setupBpmTap() {
  const now = performance.now();
  // Reset if gap > 3 seconds
  if (state.setupBpmTaps.length && now - state.setupBpmTaps[state.setupBpmTaps.length - 1] > 3000) {
    state.setupBpmTaps = [];
  }
  state.setupBpmTaps.push(now);
  if (state.setupBpmTaps.length > 12) state.setupBpmTaps = state.setupBpmTaps.slice(-12);

  if (state.setupBpmTaps.length >= 2) {
    const intervals = [];
    for (let i = 1; i < state.setupBpmTaps.length; i++) {
      intervals.push(state.setupBpmTaps[i] - state.setupBpmTaps[i - 1]);
    }
    const avg = intervals.reduce((a, b) => a + b, 0) / intervals.length;
    state.setupBpmLive = Math.round(60000 / avg);
  }

  // Update display without full re-render
  const bpmDisp = document.getElementById('setup-bpm-live');
  if (bpmDisp) bpmDisp.textContent = state.setupBpmLive || '--';
  const saveBtn = document.getElementById('save-bpm-btn');
  if (saveBtn) saveBtn.style.display = state.setupBpmLive > 0 ? 'inline-block' : 'none';
}

function saveSongBpm(bpm) {
  getSong().bpm = Math.round(bpm);
  state.setupBpmTaps = [];
  state.setupBpmLive = 0;
  saveState();
  render();
}

function toggleBandMode() {
  state.bandMode = !state.bandMode;
  resetBandState();
  // In band mode, stop any audio playback
  if (state.bandMode && state.playing) {
    const ad = getAudio();
    if (ad && ad.playing) { playGeneration++; stopSource(ad); ad.playing = false; }
    state.playing = false;
  }
  lastRenderedPerfLine = -999;
  render();
}

function resetBandState() {
  state.bandTaps = [];
  state.bandLiveBpm = 0;
  state.bandStartTime = 0;
  state.bandSongTime = 0;
}

function bandBeatTap() {
  const now = performance.now();

  // First tap = start
  if (!state.playing || state.bandTaps.length === 0) {
    state.bandTaps = [now];
    state.bandStartTime = now;
    state.bandSongTime = 0;
    state.currentTime = 0;
    state.playing = true;
    state.performLine = -1;
    lastRenderedPerfLine = -999;
    updatePerfControls();
    return;
  }

  // Reset if gap > 5 seconds (user stopped tapping)
  const lastTap = state.bandTaps[state.bandTaps.length - 1];
  if (now - lastTap > 5000) {
    state.bandTaps = [now];
    state.bandStartTime = now;
    state.bandSongTime = 0;
    state.bandLiveBpm = 0;
    return;
  }

  state.bandTaps.push(now);
  if (state.bandTaps.length > 12) state.bandTaps = state.bandTaps.slice(-12);

  // Calculate BPM from intervals
  if (state.bandTaps.length >= 2) {
    const intervals = [];
    for (let i = 1; i < state.bandTaps.length; i++) {
      intervals.push(state.bandTaps[i] - state.bandTaps[i - 1]);
    }
    // Sort and discard outliers (keep middle 60%)
    intervals.sort((a, b) => a - b);
    const trim = Math.floor(intervals.length * 0.2);
    const trimmed = intervals.slice(trim, intervals.length - trim || intervals.length);
    const avg = trimmed.reduce((a, b) => a + b, 0) / trimmed.length;
    state.bandLiveBpm = Math.max(40, Math.min(240, 60000 / avg));
  }

  // Visual pulse feedback
  const pulse = document.getElementById('band-bpm-display');
  if (pulse) {
    pulse.style.transform = 'scale(1.15)';
    setTimeout(() => { if (pulse) pulse.style.transform = 'scale(1)'; }, 100);
  }
}

function nudgeLyrics(delta) {
  state.lyricsOffset = Math.round((state.lyricsOffset + delta) * 10) / 10;
  // Force line recalc
  lastRenderedPerfLine = -999;
  updatePerfDisplay();
  // Update the offset display
  const disp = document.getElementById('offset-display');
  if (disp) {
    disp.textContent = state.lyricsOffset === 0 ? 'SYNC' : (state.lyricsOffset > 0 ? '+' : '') + state.lyricsOffset.toFixed(1) + 's';
    disp.style.color = state.lyricsOffset === 0 ? 'var(--text-muted)' : 'var(--accent)';
  }
}

function performTogglePlay() {
  // iOS: unlock AudioContext on first user gesture
  unlockAudio();

  const ad = getAudio();
  if (ad) {
    togglePlay();
  } else if (state.playing) {
    stopTimer();
    updatePerfControls();
  } else {
    startTimer();
    updatePerfControls();
  }
}

function getSong() { return state.songs[state.activeSong]; }
function getLines() { return (getSong().lyrics || '').split('\n').filter(l => l.trim()); }

function formatTime(s) {
  if (!s || isNaN(s) || s < 0) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

// ==============================
// Audio engine — Web Audio API
// ==============================
let audioCtx = null;
let playGeneration = 0;
let audioUnlocked = false;

function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

// iOS requires AudioContext to be created/resumed inside a user gesture
function unlockAudio() {
  if (audioUnlocked) return;
  const ctx = getCtx();
  if (ctx.state === 'suspended') {
    ctx.resume();
  }
  // Create and play a silent buffer to fully unlock
  const buf = ctx.createBuffer(1, 1, 22050);
  const src = ctx.createBufferSource();
  src.buffer = buf;
  src.connect(ctx.destination);
  src.start(0);
  audioUnlocked = true;
}

const audioData = {};

function getAudio() {
  return audioData[state.activeSong];
}

function loadAudioFile(songId, file) {
  unlockAudio();
  state.songs[songId].audioFile = file.name;

  const reader = new FileReader();
  reader.onload = function(e) {
    const ctx = getCtx();
    ctx.decodeAudioData(e.target.result, function(buffer) {
      audioData[songId] = {
        buffer: buffer,
        source: null,
        gainNode: null,
        startTime: 0,
        pauseOffset: 0,
        duration: buffer.duration,
        playing: false
      };
      if (songId === state.activeSong) {
        state.duration = buffer.duration;
        state.currentTime = 0;
      }
      state.audioElements[songId] = true;
      saveState();
      render();
    }, function(err) {
      console.error('Decode error:', err);
    });
  };
  reader.readAsArrayBuffer(file);
}

function stopSource(ad) {
  if (ad && ad.source) {
    ad.source.onended = null;
    try { ad.source.stop(); } catch(e) {}
    try { ad.source.disconnect(); } catch(e) {}
    ad.source = null;
  }
}

async function startPlayback(ad, offset) {
  const ctx = getCtx();
  // MUST await resume — on iOS, ctx.currentTime is frozen until resume completes.
  // Setting startTime from a frozen clock shifts ALL timings by the suspend duration.
  if (ctx.state === 'suspended') await ctx.resume();
  stopSource(ad);

  const gen = ++playGeneration;
  const source = ctx.createBufferSource();
  source.buffer = ad.buffer;
  const gain = ctx.createGain();
  source.connect(gain);
  gain.connect(ctx.destination);

  source.start(0, offset);
  ad.source = source;
  ad.gainNode = gain;
  ad.startTime = ctx.currentTime - offset;
  ad.playing = true;

  source.onended = function() {
    if (gen !== playGeneration) return;
    if (!ad.playing) return;

    ad.playing = false;
    ad.pauseOffset = 0;
    state.playing = false;
    state.currentTime = ad.duration;

    if (state.mode === 'perform') {
      if (performNextSong()) {
        setTimeout(() => performTogglePlay(), 500);
      } else {
        updatePerfControls();
      }
    } else {
      render();
    }
  };
}

async function togglePlay() {
  unlockAudio();
  const ad = getAudio();
  const hasAudio = !!ad;

  if (state.playing) {
    if (hasAudio && ad.playing) {
      const ctx = getCtx();
      ad.pauseOffset = ctx.currentTime - ad.startTime;
      if (ad.pauseOffset > ad.duration) ad.pauseOffset = ad.duration;
      ad.playing = false;
      playGeneration++;
      stopSource(ad);
    }
    state.timerOffset = state.currentTime;
    state.playing = false;
  } else {
    const offset = hasAudio ? (ad.pauseOffset || 0) : state.timerOffset;

    if (hasAudio) {
      // Await startPlayback — it ensures ctx.resume() completes before
      // setting startTime, preventing stale clock on iOS
      if (offset >= ad.duration) {
        ad.pauseOffset = 0;
        state.timerOffset = 0;
        await startPlayback(ad, 0);
      } else {
        await startPlayback(ad, offset);
      }
    }

    state.timerStart = performance.now() - (offset * 1000);
    state.playing = true;
  }

  if (state.mode === 'perform') {
    updatePerfControls();
  } else {
    render();
  }
}

function seekTo(fraction) {
  const ad = getAudio();
  const dur = ad ? ad.duration : getTimerDuration();
  const newTime = Math.max(0, Math.min(fraction * dur, dur));

  if (ad) ad.pauseOffset = newTime;
  state.timerOffset = newTime;
  state.currentTime = newTime;

  if (state.playing) {
    state.timerStart = performance.now() - (newTime * 1000);
    if (ad && ad.playing) startPlayback(ad, newTime);
  }

  if (state.mode === 'perform') {
    lastRenderedPerfLine = -1;
    updatePerfDisplay();
    updateTimeDisplays();
  } else {
    render();
  }
}

function getTimerDuration() {
  const song = getSong();
  if (song.timings && song.timings.length > 0) {
    return song.timings[song.timings.length - 1] + 5;
  }
  return 60;
}

// ==============================
// Lightweight per-frame updates
// ==============================
function updateTimeDisplays() {
  const ad = getAudio();
  const song = getSong();
  const dur = ad ? ad.duration : (song && song.timings && song.timings.length ? song.timings[song.timings.length - 1] + 5 : 0);
  const progress = dur ? Math.min((state.currentTime / dur) * 100, 100) : 0;

  const fills = document.querySelectorAll('.progress-fill');
  for (let i = 0; i < fills.length; i++) fills[i].style.width = progress + '%';

  const times = document.querySelectorAll('.time-display');
  const timeStr = formatTime(state.currentTime) + ' / ' + formatTime(dur);
  for (let i = 0; i < times.length; i++) times[i].textContent = timeStr;

  const bigTimer = document.getElementById('perf-timer');
  if (bigTimer) {
    if (state.bandMode) {
      bigTimer.textContent = state.bandLiveBpm > 0 ? Math.round(state.bandLiveBpm) + ' BPM' : 'TAP BEAT';
      const c = state.playing ? 'var(--green)' : 'var(--accent)';
      bigTimer.style.color = c;
      bigTimer.style.textShadow = '0 0 40px ' + c;
    } else {
      bigTimer.textContent = formatTime(state.currentTime);
      const c = state.playing ? 'var(--green)' : 'var(--accent)';
      bigTimer.style.color = c;
      bigTimer.style.textShadow = '0 0 40px ' + c;
    }
  }

  // Band mode BPM display
  const bandDisp = document.getElementById('band-bpm-display');
  if (bandDisp) {
    bandDisp.textContent = state.bandLiveBpm > 0 ? Math.round(state.bandLiveBpm) + ' BPM' : '--';
  }
}

function updatePerfControls() {
  const playBtn = document.getElementById('perf-play');
  if (playBtn) {
    playBtn.innerHTML = state.playing ? '&#10074;&#10074;' : '&#9654;';
    playBtn.style.background = state.playing ? 'var(--green)' : 'var(--accent)';
  }

  const statusEl = document.getElementById('perf-status');
  if (statusEl) {
    const lines = getLines();
    if (!lines.length) {
      statusEl.textContent = 'NO LYRICS FOR THIS SONG';
      statusEl.style.opacity = '1';
    } else if (!state.playing && state.currentTime < 0.1) {
      statusEl.textContent = 'PRESS PLAY TO START';
      statusEl.style.opacity = '1';
    } else {
      statusEl.style.opacity = '0';
    }
  }
}

// Core perform mode update — only changes DOM when current line changes
function updatePerfDisplay() {
  if (!perfDomReady) return;

  const song = getSong();
  if (!song.timings || !song.timings.length) return;

  // Apply lyrics offset: positive = lyrics arrive earlier, negative = later
  const t = state.currentTime + state.lyricsOffset;
  let line = -1; // -1 = before first timing, no line active yet
  for (let i = song.timings.length - 1; i >= 0; i--) {
    if (t >= song.timings[i]) {
      line = i;
      break;
    }
  }
  state.performLine = line;

  if (line === lastRenderedPerfLine) return;
  lastRenderedPerfLine = line;

  const lineEls = document.querySelectorAll('#perf-scroll .perf-line');
  const count = lineEls.length;
  for (let i = 0; i < count; i++) {
    // When line is -1 (before first timing), all lines are "upcoming"
    const dist = line === -1 ? (i + 1) : (i - line);
    let cls = 'perf-line';
    if (lineEls[i].dataset.section === '1') cls += ' section-marker';

    if (dist < -3) cls += ' distant-past';
    else if (dist < 0) cls += ' past';
    else if (dist === 0) cls += ' current';
    else if (dist === 1) cls += ' next';
    else if (dist === 2) cls += ' next-2';
    else if (dist <= 5) cls += ' far';
    else cls += ' distant-far';

    lineEls[i].className = cls;
  }

  if (line >= 0) scrollPerfTo(line, lineEls);
}

// Countdown bar + seconds until next line during gaps
let countdownTotalGap = 0; // total gap when countdown started
function updatePerfCountdown() {
  const el = document.getElementById('perf-countdown');
  const secEl = document.getElementById('cd-seconds');
  const barEl = document.getElementById('cd-bar-fill');
  if (!el || !secEl || !barEl || !state.playing) {
    if (el && el.classList.contains('visible')) el.classList.remove('visible');
    countdownTotalGap = 0;
    return;
  }

  const song = getSong();
  if (!song.timings || !song.timings.length) return;

  const t = state.currentTime + state.lyricsOffset;
  const line = state.performLine;

  // Find the next line's timing
  const nextIdx = line + 1;
  let nextTime;
  if (line === -1) {
    nextTime = song.timings[0];
  } else if (nextIdx < song.timings.length) {
    nextTime = song.timings[nextIdx];
  } else {
    if (el.classList.contains('visible')) el.classList.remove('visible');
    countdownTotalGap = 0;
    return;
  }

  // Total gap = time from current line's timing (or 0) to next line's timing
  const gapStart = line === -1 ? 0 : song.timings[line];
  const totalGap = nextTime - gapStart;
  const remaining = nextTime - t;
  const THRESHOLD = 4;

  if (totalGap > THRESHOLD && remaining > 0.3) {
    // Track the full gap duration for bar percentage
    if (!countdownTotalGap || Math.abs(countdownTotalGap - totalGap) > 1) {
      countdownTotalGap = totalGap;
    }

    const secs = Math.ceil(remaining);
    secEl.textContent = secs;
    barEl.style.width = ((remaining / countdownTotalGap) * 100) + '%';

    if (!el.classList.contains('visible')) el.classList.add('visible');
  } else {
    if (el.classList.contains('visible')) el.classList.remove('visible');
    countdownTotalGap = 0;
  }
}

function scrollPerfTo(lineIdx, lineEls) {
  if (!perfScrollReady) return; // Initial positioning not yet done
  const scroll = document.getElementById('perf-scroll');
  const container = document.getElementById('perf-lyrics-area');
  if (!scroll || !container || !lineEls || !lineEls[lineIdx]) return;

  // Defer by one frame so browser has applied new class layout,
  // then scroll and font-size transitions animate together
  requestAnimationFrame(() => {
    const el = lineEls[lineIdx];
    if (!el) return;
    const containerH = container.clientHeight;
    const targetY = el.offsetTop - (containerH * 0.38) + (el.offsetHeight / 2);
    scroll.style.transform = 'translateY(' + (-Math.max(0, targetY)) + 'px)';
  });
}

// Master display loop — runs every frame, updates UI for audio OR standalone timer
function audioTick() {
  requestAnimationFrame(audioTick);

  const ad = getAudio();

  // Band mode: scale real time by BPM ratio
  if (state.bandMode && state.playing && state.bandLiveBpm > 0) {
    const song = getSong();
    const originalBpm = song.bpm || 120;
    const elapsedReal = (performance.now() - state.bandStartTime) / 1000;
    state.currentTime = (originalBpm / state.bandLiveBpm) * elapsedReal;
    state.bandSongTime = state.currentTime;
  }
  // Update currentTime from audio clock when audio is playing (backing track mode)
  else if (ad && ad.playing) {
    const ctx = getCtx();
    state.currentTime = ctx.currentTime - ad.startTime;
    if (state.currentTime > ad.duration) state.currentTime = ad.duration;
    state.duration = ad.duration;
  }

  // Always update displays (timer, progress bar) — works for both audio and standalone timer
  updateTimeDisplays();
  if (state.mode === 'perform') {
    updatePerfDisplay();
    updatePerfCountdown();
  }
}
requestAnimationFrame(audioTick);

// ==============================
// Song / mode management
// ==============================
function selectSong(id) {
  if (state.playing) {
    const ad = getAudio();
    if (ad) { playGeneration++; stopSource(ad); ad.playing = false; }
    state.playing = false;
  }
  resetTimer();
  state.activeSong = id;
  state.rehearsalLine = 0;
  state.performLine = 0;
  state.lyricsOffset = 0;
  resetBandState();
  lastRenderedPerfLine = -1;
  const ad = audioData[id];
  if (ad) {
    state.duration = ad.duration;
    state.currentTime = ad.pauseOffset || 0;
  } else {
    state.duration = 0;
    state.currentTime = 0;
  }

  perfDomReady = false;
  perfScrollReady = false;
  render();
}

function setMode(m) {
  state.mode = m;
  perfDomReady = false;
  perfScrollReady = false;
  lastRenderedPerfLine = -1;

  if (m === 'rehearsal') {
    state.rehearsalLine = 0;
    const ad = getAudio();
    if (ad) { playGeneration++; stopSource(ad); ad.playing = false; ad.pauseOffset = 0; }
    state.playing = false;
    state.currentTime = 0;
  }

  if (m === 'perform') {
    state.performLine = 0;
    state.showCursor = true;
    resetTimer();
    const ad = getAudio();
    if (ad) { playGeneration++; stopSource(ad); ad.playing = false; ad.pauseOffset = 0; }
    state.currentTime = 0;
    // Start on first setlist song if setlist exists
    const perfList = getPerformList();
    if (perfList.length > 0) {
      state.activeSong = perfList[0].id;
      state.setlistIndex = 0;
    }
  }

  render();
}

function rehearsalTap() {
  const lines = getLines();
  const ad = getAudio();
  if (!ad || !lines.length) return;

  // Read fresh time directly from AudioContext (not stale state.currentTime)
  let tapTime;
  if (ad.playing) {
    const ctx = getCtx();
    tapTime = ctx.currentTime - ad.startTime;
  } else {
    tapTime = state.currentTime;
  }

  const song = getSong();
  if (!song.timings) song.timings = [];

  song.timings[state.rehearsalLine] = tapTime;
  state.rehearsalLine++;
  saveState(); // Save after every tap so progress isn't lost

  if (state.rehearsalLine >= lines.length) {
    state.rehearsalLine = 0;
    playGeneration++;
    stopSource(ad);
    ad.playing = false;
    ad.pauseOffset = 0;
    state.playing = false;
  }

  render();
}

// Cursor auto-hide — class toggle only, NO render()
function perfMouseMove() {
  const view = document.getElementById('perf-view');
  if (!view) return;
  if (!view.classList.contains('show-cursor')) view.classList.add('show-cursor');

  clearTimeout(state.cursorTimeout);
  state.cursorTimeout = setTimeout(() => {
    const v = document.getElementById('perf-view');
    if (v) v.classList.remove('show-cursor');
  }, 3000);
}

// ==============================
// Render
// ==============================
function render() {
  const existingModal = document.getElementById('modal-overlay');
  if (existingModal) existingModal.remove();

  const app = document.getElementById('app');

  if (state.mode === 'perform') {
    app.innerHTML = renderPerformance();
    perfDomReady = true;
    lastRenderedPerfLine = -1; // No line active until first timing is reached
    attachPerformEvents();
    updatePerfControls();

    // Set initial scroll position WITHOUT transition (instant snap to line 0)
    perfScrollReady = false;
    const scroll = document.getElementById('perf-scroll');
    const container = document.getElementById('perf-lyrics-area');
    if (scroll && container) {
      scroll.style.transition = 'none';
      const lineEls = document.querySelectorAll('#perf-scroll .perf-line');
      if (lineEls[0]) {
        requestAnimationFrame(() => {
          const containerH = container.clientHeight;
          const targetY = lineEls[0].offsetTop - (containerH * 0.38) + (lineEls[0].offsetHeight / 2);
          scroll.style.transform = 'translateY(' + (-Math.max(0, targetY)) + 'px)';
          // Re-enable transition after initial position is painted
          requestAnimationFrame(() => {
            scroll.style.transition = '';
            perfScrollReady = true; // Now scrollPerfTo can use CSS transitions
          });
        });
      } else {
        perfScrollReady = true;
      }
    } else {
      perfScrollReady = true;
    }
    return;
  }

  perfDomReady = false;
  perfScrollReady = false;

  app.innerHTML = `
    <div class="app">
      <div class="sidebar">
        <div class="sidebar-header">
          <h1>Teleprompter</h1>

            return `
              <div class="song-item ${state.activeSong === s.id ? 'active' : ''}" data-song="${s.id}">

                  <span class="status-dot ${hasAudio ? 'has-audio' : ''}"></span>
                  <span class="status-dot ${hasTimings ? 'has-timing' : ''}"></span>
                </span>
              </div>
            `;
          }).join('')}
        </div>
        <div class="sidebar-footer" style="flex-direction:column; gap:8px;">
          <div style="display:flex; gap:6px;">
            <span class="legend"><span class="status-dot has-lyrics"></span>Lyrics</span>
            <span class="legend"><span class="status-dot has-audio"></span>Audio</span>
            <span class="legend"><span class="status-dot has-timing"></span>Timed</span>
          </div>
          <div style="display:flex; gap:4px;">
            <button class="btn btn-accent" style="flex:1; font-size:10px; padding:5px;" id="add-song-btn">+ Add Song</button>
          </div>
          <div style="display:flex; gap:4px;">
            <button class="btn" style="flex:1; font-size:10px; padding:5px;" id="export-btn">Export</button>
            <button class="btn" style="flex:1; font-size:10px; padding:5px;" id="import-btn">Import</button>
          </div>
        </div>
      </div>
      <div class="main">
        <div class="toolbar">
          <div class="mode-tabs">
            <button class="mode-tab ${state.mode === 'setup' ? 'active' : ''}" data-mode="setup">Setup</button>
            <button class="mode-tab ${state.mode === 'rehearsal' ? 'active' : ''}" data-mode="rehearsal">Rehearse</button>
            <button class="mode-tab ${state.mode === 'setlist' ? 'active' : ''}" data-mode="setlist">Setlist</button>
          </div>
          <div class="toolbar-spacer"></div>
          ${canPerform() ? `<button class="btn btn-accent" id="go-perform">&#9654; Perform</button>` : ''}
        </div>
        <div class="content">
          ${state.mode === 'setup' ? renderSetup() : state.mode === 'setlist' ? renderSetlist() : renderRehearsal()}
        </div>
        ${renderAudioBar()}
      </div>
    </div>
  `;

  attachEvents();

  // Modal
  const modalHtml = renderModal();
  if (modalHtml) {
    const modalDiv = document.createElement('div');
    modalDiv.innerHTML = modalHtml;
    document.body.appendChild(modalDiv.firstElementChild);

    const overlay = document.getElementById('modal-overlay');
    if (overlay) overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });

    const closeBtn = document.getElementById('modal-close');
    if (closeBtn) closeBtn.addEventListener('click', closeModal);

    const copyBtn = document.getElementById('modal-copy');
    if (copyBtn) copyBtn.addEventListener('click', () => {
      const ta = document.getElementById('modal-textarea');
      if (ta) {
        ta.select();
        navigator.clipboard.writeText(ta.value).then(() => {
          copyBtn.textContent = 'Copied!';
          setTimeout(() => { copyBtn.textContent = 'Copy to Clipboard'; }, 1500);
        }).catch(() => {
          ta.select();
          document.execCommand('copy');
          copyBtn.textContent = 'Copied!';
        });
      }
    });

    const importBtn2 = document.getElementById('modal-import');
    if (importBtn2) importBtn2.addEventListener('click', () => {
      const ta = document.getElementById('modal-textarea');
      if (ta && ta.value.trim()) importData(ta.value.trim());
    });
  }
}

function renderPerformance() {
  const song = getSong();
  const lines = getLines();

  const dur = ad ? ad.duration : (song.timings && song.timings.length ? song.timings[song.timings.length - 1] + 5 : 0);
  const progress = dur ? (state.currentTime / dur) * 100 : 0;

  const perfList = getPerformList();
  const songOptions = perfList.map((s, i) => {
    const sel = s.id === state.activeSong ? 'selected' : '';
    return `<option value="${s.id}" ${sel}>${i + 1}. ${s.name}</option>`;
  }).join('');

  const statusText = !lines.length
    ? 'NO LYRICS FOR THIS SONG'
    : (!state.playing && state.currentTime < 0.1 ? 'PRESS PLAY TO START' : '');

  const linesHtml = lines.map((line, i) => {
    const isSection = /^\[.*\]$/.test(line.trim());
    // Before first timing: no line is "current" — all are upcoming
    let cls = 'perf-line';
    if (isSection) cls += ' section-marker';
    if (i === 0) cls += ' next';
    else if (i === 1) cls += ' next-2';
    else if (i <= 4) cls += ' far';
    else cls += ' distant-far';
    return `<div class="${cls}" data-idx="${i}" data-section="${isSection ? '1' : '0'}">${escHtml(line)}</div>`;
  }).join('');

  const perfListIdx = perfList.findIndex(s => s.id === state.activeSong);
  const songMeta = SONGS.find(s => s.id === state.activeSong);

  return `
    <div class="performance-view show-cursor" id="perf-view">
      <div class="perf-timer" id="perf-timer" style="
        color:${state.playing ? 'var(--green)' : 'var(--accent)'};
        text-shadow: 0 0 40px ${state.playing ? 'var(--green)' : 'var(--accent)'};
      ">${formatTime(state.currentTime)}</div>
      ${perfList.length > 1 ? `
        <div style="position:absolute; top:12px; left:20px; z-index:10; pointer-events:none;">
          <div style="font-family:'Space Mono',monospace; font-size:11px; color:var(--text-muted); letter-spacing:1px;">
            ${perfListIdx + 1} / ${perfList.length}
          </div>
          <div style="font-size:13px; color:var(--accent); margin-top:2px;">${escHtml(songMeta ? songMeta.name : '')}</div>
        </div>
      ` : ''}

      <div class="perf-lyrics" id="perf-lyrics-area">
        <div class="perf-status" id="perf-status" style="opacity:${statusText ? '1' : '0'};">${statusText}</div>
        <div class="perf-countdown" id="perf-countdown">
          <div class="cd-seconds" id="cd-seconds"></div>
          <div class="cd-bar-track"><div class="cd-bar-fill" id="cd-bar-fill"></div></div>
        </div>
        <div class="perf-scroll" id="perf-scroll">
          ${linesHtml}
        </div>
      </div>

      <div class="perf-controls">
        <div class="progress-wrap" id="perf-progress-bar" style="height:14px;">
          <div class="progress-fill" style="width:${Math.min(progress, 100)}%"></div>
        </div>
        <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
          ${getSong().bpm ? `
          <button id="band-toggle" style="
            width:88px; height:88px; border-radius:12px;
            border:2px solid ${state.bandMode ? 'var(--accent)' : '#444'};
            background:${state.bandMode ? 'var(--accent)' : '#111'};
            color:${state.bandMode ? '#000' : '#666'};
            font-size:14px; font-weight:700; cursor:pointer;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            font-family:'Space Mono',monospace; flex-shrink:0;
            touch-action:manipulation; letter-spacing:1px;
          "><span style="font-size:11px;">BAND</span><span style="font-size:11px;">MODE</span></button>
          ` : ''}
          ${state.bandMode ? `
          <div id="band-bpm-display" style="
            font-family:'Space Mono',monospace; font-size:28px; font-weight:700;
            color:var(--accent); min-width:100px; text-align:center;
            transition: transform 0.1s ease;
          ">${state.bandLiveBpm > 0 ? Math.round(state.bandLiveBpm) + ' BPM' : '--'}</div>
          ` : ''}
          <button id="perf-rewind" style="
            width:88px; height:88px; border-radius:50%; border:2px solid #444;
            background:#111; color:#aaa; font-size:36px; cursor:pointer;
            display:flex; align-items:center; justify-content:center;
            font-family:'DM Sans',sans-serif; flex-shrink:0;
            touch-action:manipulation;
          ">&#8634;</button>
          <button id="perf-play" style="
            width:120px; height:120px; border-radius:50%; border:none;
            background:${state.playing ? 'var(--green)' : 'var(--accent)'};
            color:#000; font-size:48px; cursor:pointer;
            display:flex; align-items:center; justify-content:center;
            flex-shrink:0; font-weight:bold;
            touch-action:manipulation;
          ">${state.playing ? '&#10074;&#10074;' : '&#9654;'}</button>
          <select id="perf-song-select" style="
            flex:1; max-width:400px; padding:16px 20px;
            background:#111; color:var(--text); border:2px solid #444;
            border-radius:10px; font-family:'DM Sans',sans-serif;
            font-size:22px; cursor:pointer; appearance:auto;
          ">${songOptions}</select>
          <div style="display:flex; align-items:center; gap:4px; flex-shrink:0;">
            <button id="nudge-earlier" style="
              width:88px; height:88px; border-radius:12px; border:2px solid #444;
              background:#111; color:#aaa; font-size:36px; cursor:pointer;
              display:flex; align-items:center; justify-content:center;
              font-family:'Space Mono',monospace; touch-action:manipulation;
            ">&laquo;</button>
            <div id="offset-display" style="
              font-family:'Space Mono',monospace; font-size:22px;
              color:${state.lyricsOffset === 0 ? 'var(--text-muted)' : 'var(--accent)'};
              min-width:80px; text-align:center;
            ">${state.lyricsOffset === 0 ? 'SYNC' : (state.lyricsOffset > 0 ? '+' : '') + state.lyricsOffset.toFixed(1) + 's'}</div>
            <button id="nudge-later" style="
              width:88px; height:88px; border-radius:12px; border:2px solid #444;
              background:#111; color:#aaa; font-size:36px; cursor:pointer;
              display:flex; align-items:center; justify-content:center;
              font-family:'Space Mono',monospace; touch-action:manipulation;
            ">&raquo;</button>
          </div>
          <div class="time-display" style="min-width:160px; font-size:22px;">
            ${formatTime(state.currentTime)} / ${formatTime(dur)}
          </div>
          <button id="perf-exit" style="
            padding:16px 32px; border-radius:10px; border:1px solid #444;
            background:#111; color:#888; font-size:24px; cursor:pointer;
            font-family:'DM Sans',sans-serif; flex-shrink:0;
            touch-action:manipulation;
          ">Exit</button>
        </div>
      </div>
    </div>
  `;
}

function renderAudioBar() {
  const audio = getAudio();
  if (!audio) return '';
  const progress = state.duration ? (state.currentTime / state.duration) * 100 : 0;

  return `
    <div class="audio-bar">
      <button class="play-btn" id="play-btn">&#9654;</button>
      <div class="progress-wrap" id="progress-bar">
        <div class="progress-fill" style="width:${progress}%"></div>
      </div>
      <div class="time-display">${formatTime(state.currentTime)} / ${formatTime(state.duration)}</div>
    </div>
  `;
}

function escHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

// ==============================
// Event binding
// ==============================
function attachEvents() {
  document.querySelectorAll('.song-item').forEach(el => {
    el.addEventListener('click', () => selectSong(parseInt(el.dataset.song)));
  });

  document.querySelectorAll('.mode-tab').forEach(el => {
    el.addEventListener('click', () => setMode(el.dataset.mode));
  });

  const perfBtn = document.getElementById('go-perform');
  if (perfBtn) perfBtn.addEventListener('click', () => setMode('perform'));

  const exportBtn = document.getElementById('export-btn');
  if (exportBtn) exportBtn.addEventListener('click', exportData);
  const importBtn = document.getElementById('import-btn');
  if (importBtn) importBtn.addEventListener('click', showImportModal);

  // Add song
  const addBtn = document.getElementById('add-song-btn');
  if (addBtn) addBtn.addEventListener('click', () => {
    const name = prompt('Song name:');
    if (name && name.trim()) addSong(name.trim());
  });

  // Rename song
  const renameBtn = document.getElementById('rename-song-btn');
  if (renameBtn) renameBtn.addEventListener('click', () => {
    const input = document.getElementById('song-name-input');
    if (input && input.value.trim()) renameSong(state.activeSong, input.value.trim());
  });

  // Delete song
  const deleteBtn = document.getElementById('delete-song-btn');
  if (deleteBtn) deleteBtn.addEventListener('click', () => {
    const songMeta = SONGS.find(s => s.id === state.activeSong);
    if (confirm('Delete "' + songMeta.name + '"? This removes lyrics and timings.')) {
      deleteSong(state.activeSong);
    }
  });

  // BPM setup controls
  const bpmTapBtn = document.getElementById('setup-bpm-tap');
  if (bpmTapBtn) bpmTapBtn.addEventListener('click', setupBpmTap);
  const saveBpmBtn = document.getElementById('save-bpm-btn');
  if (saveBpmBtn) saveBpmBtn.addEventListener('click', () => { if (state.setupBpmLive > 0) saveSongBpm(state.setupBpmLive); });
  const saveManualBpm = document.getElementById('save-manual-bpm');
  if (saveManualBpm) saveManualBpm.addEventListener('click', () => {
    const val = parseInt(document.getElementById('manual-bpm').value);
    if (val >= 40 && val <= 240) saveSongBpm(val);
  });
  const clearBpm = document.getElementById('clear-bpm');
  if (clearBpm) clearBpm.addEventListener('click', () => { getSong().bpm = null; saveState(); render(); });

  // Setlist controls
  document.querySelectorAll('.setlist-add').forEach(el => {
    el.addEventListener('click', () => {
      const id = parseInt(el.dataset.id);
      if (!state.setlist.includes(id)) {
        state.setlist.push(id);
        saveState();
        render();
      }
    });
  });
  document.querySelectorAll('.setlist-remove').forEach(el => {
    el.addEventListener('click', () => {
      state.setlist.splice(parseInt(el.dataset.idx), 1);
      saveState();
      render();
    });
  });
  document.querySelectorAll('.setlist-up').forEach(el => {
    el.addEventListener('click', () => {
      const i = parseInt(el.dataset.idx);
      if (i > 0) { [state.setlist[i-1], state.setlist[i]] = [state.setlist[i], state.setlist[i-1]]; saveState(); render(); }
    });
  });
  document.querySelectorAll('.setlist-down').forEach(el => {
    el.addEventListener('click', () => {
      const i = parseInt(el.dataset.idx);
      if (i < state.setlist.length - 1) { [state.setlist[i], state.setlist[i+1]] = [state.setlist[i+1], state.setlist[i]]; saveState(); render(); }
    });
  });
  const clearSetlist = document.getElementById('clear-setlist');
  if (clearSetlist) clearSetlist.addEventListener('click', () => { state.setlist = []; saveState(); render(); });

  const playBtn = document.getElementById('play-btn');
  if (playBtn) playBtn.addEventListener('click', () => { unlockAudio(); togglePlay(); });

  const progBar = document.getElementById('progress-bar');
  if (progBar) {
    progBar.addEventListener('click', (e) => {
      const rect = progBar.getBoundingClientRect();
      seekTo((e.clientX - rect.left) / rect.width);
    });
  }

  const lyricsInput = document.getElementById('lyrics-input');
  if (lyricsInput) {
    lyricsInput.addEventListener('input', (e) => {
      getSong().lyrics = e.target.value;
      saveState();
    });
  }

  const audioDrop = document.getElementById('audio-drop');
  const audioInput = document.getElementById('audio-input');
  if (audioDrop) {
    audioDrop.addEventListener('click', () => audioInput.click());
    audioDrop.addEventListener('dragover', (e) => { e.preventDefault(); audioDrop.style.borderColor = 'var(--accent)'; });
    audioDrop.addEventListener('dragleave', () => { audioDrop.style.borderColor = 'var(--border)'; });
    audioDrop.addEventListener('drop', (e) => {
      e.preventDefault();
      if (e.dataTransfer.files.length) loadAudioFile(state.activeSong, e.dataTransfer.files[0]);
    });
  }
  if (audioInput) {
    audioInput.addEventListener('change', (e) => {
      if (e.target.files.length) loadAudioFile(state.activeSong, e.target.files[0]);
    });
  }

  const removeAudio = document.getElementById('remove-audio');
  if (removeAudio) {
    removeAudio.addEventListener('click', () => {
      const ad = getAudio();
      if (ad) { playGeneration++; stopSource(ad); }
      delete audioData[state.activeSong];
      delete state.audioElements[state.activeSong];
      getSong().audioFile = null;
      state.playing = false;
      state.duration = 0;
      state.currentTime = 0;
      render();
    });
  }

  const clearTimings = document.getElementById('clear-timings');
  if (clearTimings) {
    clearTimings.addEventListener('click', () => {
      getSong().timings = [];
      saveState();
      state.rehearsalLine = 0;
      const ad = getAudio();
      if (ad) { playGeneration++; stopSource(ad); ad.playing = false; ad.pauseOffset = 0; }
      state.playing = false;
      state.currentTime = 0;
      render();
    });
  }

  const tapBtn = document.getElementById('tap-btn');
  if (tapBtn) {
    tapBtn.addEventListener('click', () => {
      unlockAudio();
      if (state.playing) rehearsalTap();
    });
    // Touch support — touchstart for lowest latency (finger down = tap)
    tapBtn.addEventListener('touchstart', (e) => {
      e.preventDefault(); // Prevents click from also firing
      unlockAudio();
      if (state.playing) rehearsalTap();
    });
  }
}

function attachPerformEvents() {
  const view = document.getElementById('perf-view');
  if (!view) return;

  view.addEventListener('click', function(e) {
    if (e.target.id === 'perf-exit' || e.target.closest('#perf-exit')) {
      e.stopPropagation();
      resetTimer();
      const ad = getAudio();
      if (ad && ad.playing) { playGeneration++; stopSource(ad); ad.playing = false; ad.pauseOffset = 0; }
      state.playing = false;
      setMode('setup');
      return;
    }

    // Band mode toggle
    if (e.target.id === 'band-toggle' || e.target.closest('#band-toggle')) {
      e.stopPropagation();
      toggleBandMode();
      return;
    }

    if (e.target.id === 'perf-play' || e.target.closest('#perf-play')) {
      e.stopPropagation();
      if (state.bandMode) { bandBeatTap(); } else { performTogglePlay(); }
      return;
    }

    if (e.target.id === 'perf-rewind' || e.target.closest('#perf-rewind')) {
      e.stopPropagation();
      if (state.playing) {
        const ad = getAudio();
        if (ad && ad.playing) { playGeneration++; stopSource(ad); ad.playing = false; ad.pauseOffset = 0; }
        if (perfTimer) cancelAnimationFrame(perfTimer);
        perfTimer = null;
      }
      state.playing = false;
      state.timerOffset = 0;
      state.timerStart = 0;
      state.currentTime = 0;
      state.performLine = 0;
      lastRenderedPerfLine = -1;
      const ad2 = getAudio();
      if (ad2) ad2.pauseOffset = 0;
      updatePerfDisplay();
      updatePerfControls();
      updateTimeDisplays();
      return;
    }

    // Nudge lyrics earlier/later
    if (e.target.id === 'nudge-earlier' || e.target.closest('#nudge-earlier')) {
      e.stopPropagation();
      nudgeLyrics(-0.5);
      return;
    }
    if (e.target.id === 'nudge-later' || e.target.closest('#nudge-later')) {
      e.stopPropagation();
      nudgeLyrics(0.5);
      return;
    }

    const progBar = e.target.closest('#perf-progress-bar');
    if (progBar) {
      e.stopPropagation();
      const rect = progBar.getBoundingClientRect();
      seekTo((e.clientX - rect.left) / rect.width);
      return;
    }

    if (e.target.closest('.perf-controls')) return;

    // Band mode: tap = beat, Backing track: tap = play/pause
    if (state.bandMode) { bandBeatTap(); } else { performTogglePlay(); }
  });

  // Touch support for lyrics area tap
  const lyricsArea = document.getElementById('perf-lyrics-area');
  if (lyricsArea) {
    lyricsArea.addEventListener('touchend', (e) => {
      // Only handle taps on the lyrics area itself, not controls
      if (e.target.closest('.perf-controls')) return;
      e.preventDefault();
      performTogglePlay();
    });
  }

  view.addEventListener('change', function(e) {
    if (e.target.id === 'perf-song-select') {
      const newId = parseInt(e.target.value);
      if (state.playing) {
        const ad = getAudio();
        if (ad && ad.playing) { playGeneration++; stopSource(ad); ad.playing = false; }
        if (perfTimer) cancelAnimationFrame(perfTimer);
        perfTimer = null;
        state.playing = false;
      }
      state.timerOffset = 0;
      state.timerStart = 0;
      state.currentTime = 0;
      state.performLine = 0;
      lastRenderedPerfLine = -1;
      state.activeSong = newId;
      const ad2 = audioData[newId];
      if (ad2) { state.duration = ad2.duration; ad2.pauseOffset = 0; }
      else { state.duration = 0; }
      perfDomReady = false;
  perfScrollReady = false;
      render();
    }
  });

  view.addEventListener('mousemove', perfMouseMove);
  // Touch triggers cursor show too
  view.addEventListener('touchstart', perfMouseMove, { passive: true });
}

// Global keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

  if (e.code === 'Space') {
    e.preventDefault();
    if (state.mode === 'rehearsal' && state.playing) {
      rehearsalTap();
    } else if (state.mode === 'perform') {
      if (state.bandMode) { bandBeatTap(); } else { performTogglePlay(); }
    } else {
      unlockAudio();
      togglePlay();
    }
  }

  if (e.code === 'Escape' && state.mode === 'perform') {
    resetTimer();
    const ad = getAudio();
    if (ad && ad.playing) { playGeneration++; stopSource(ad); ad.playing = false; ad.pauseOffset = 0; }
    state.playing = false;
    setMode('setup');
  }

  if (state.mode === 'perform') {
    if (e.code === 'ArrowRight' || e.code === 'ArrowDown') {
      performNextSong();
    }
    if (e.code === 'ArrowLeft' || e.code === 'ArrowUp') {
      performPrevSong();
    }
    // [ and ] nudge lyrics timing
    if (e.code === 'BracketLeft') {
      nudgeLyrics(-0.5);
    }
    if (e.code === 'BracketRight') {
      nudgeLyrics(0.5);
    }
  }
});

// ==============================
// Init
// ==============================
// Load localStorage first (instant), render, then try cloud sync in background
loadState();
render();
cloudLoad().then(loaded => {
  if (loaded) {
    // Cloud had newer data — also update localStorage and re-render
    saveState();
    render();
  }
});
</script>
